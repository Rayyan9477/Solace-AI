# Solace-AI Alembic Configuration
# Database migration management for the Solace-AI mental health platform.

[alembic]
# Path to migration scripts directory
script_location = migrations

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path prepend — allows importing project modules
prepend_sys_path = .

# Timezone for migration revision timestamps (UTC for consistency)
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment against multiple databases
# (not needed for Solace-AI single-db setup)
# sourceless = false

# Version table name
# version_table = alembic_version

# Version table schema
# version_table_schema =

# Database URL — reads from DATABASE_URL environment variable with fallback
# For async drivers, use postgresql+asyncpg://
sqlalchemy.url = postgresql+asyncpg://solace:solace@localhost:5432/solace_dev


[post_write_hooks]
# Hooks executed after writing new migration files.
# Uncomment below to auto-format generated migrations with ruff.
# hooks = ruff_format
# ruff_format.type = console_scripts
# ruff_format.entrypoint = ruff
# ruff_format.options = format REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
